<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LibraFlow – Members</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
<div class="wrapper">

  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="d-flex align-items-center gap-2">
        <div class="brand-icon"><i class="fas fa-book-open" style="color:white;font-size:1rem;"></i></div>
        <span class="brand-name">LibraFlow</span>
      </div>
      <div style="font-size:0.7rem;color:rgba(255,255,255,0.3);margin-top:4px;padding-left:2px;">Library Management System</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-label">Main Menu</div>
      <div class="nav-item"><a href="index.html" class="nav-link-custom"><div class="nav-icon"><i class="fas fa-chart-pie"></i></div><span>Dashboard</span></a></div>
      <div class="nav-item"><a href="books.html" class="nav-link-custom"><div class="nav-icon"><i class="fas fa-book"></i></div><span>Books</span></a></div>
      <div class="nav-item"><a href="members.html" class="nav-link-custom active-nav"><div class="nav-icon"><i class="fas fa-users"></i></div><span>Members</span></a></div>
      <div class="nav-item"><a href="issues.html" class="nav-link-custom"><div class="nav-icon"><i class="fas fa-exchange-alt"></i></div><span>Issue / Return</span></a></div>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="topbar-avatar" style="width:34px;height:34px;font-size:0.75rem;">AD</div>
        <div class="sidebar-user-info"><h6>Admin User</h6><span>Administrator</span></div>
      </div>
    </div>
  </nav>

  <div id="content">
    <div class="topbar">
      <div class="d-flex align-items-center gap-3">
        <button id="sidebarToggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div class="topbar-title">Members</div>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn"><i class="fas fa-bell"></i><span class="notif-dot"></span></button>
        <div class="topbar-avatar">AD</div>
      </div>
    </div>

    <div class="page-content">
      <div class="page-header">
        <div>
          <h2>Member Management</h2>
          <p style="color:#94a3b8;font-size:0.85rem;margin-top:4px;">Register and manage library members</p>
        </div>
        <button class="btn-primary-custom" onclick="openAddMember()">
          <i class="fas fa-user-plus"></i> Add Member
        </button>
      </div>

      <div id="alertContainer"></div>

      <div class="card-premium">
        <div class="card-header-premium">
          <h5><i class="fas fa-users me-2" style="color:#6C63FF;"></i>All Members</h5>
        </div>
        <div class="card-body-premium">
          <table class="table-premium" id="membersTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Member</th>
                <th>Email</th>
                <th style="text-align:right;">Actions</th>
              </tr>
            </thead>
            <tbody id="membersTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Member Modal -->
<div class="modal fade modal-premium" id="memberModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="memberModalTitle"><i class="fas fa-user-plus me-2"></i>Add New Member</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="memberForm" onsubmit="saveMember(event)">
          <input type="hidden" id="memberId" />
          <div class="form-group">
            <label class="form-label-custom">Full Name</label>
            <input type="text" id="memberName" class="form-control-custom" placeholder="e.g. John Doe" required />
          </div>
          <div class="form-group">
            <label class="form-label-custom">Email Address</label>
            <input type="email" id="memberEmail" class="form-control-custom" placeholder="e.g. john@example.com" required />
          </div>
          <button type="submit" class="btn-submit-custom">
            <i class="fas fa-save me-2"></i>Save Member
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>document.addEventListener('DOMContentLoaded', fetchMembers);</script>
</body>
</html>
